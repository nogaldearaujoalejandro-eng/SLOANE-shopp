<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLOANE | Cosmética Contemporánea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-marca: #5f9ea0;
            --azul-oscuro: #2f4f4f;
            --azul-fondo: #f4f7f9;
            --blanco: #ffffff;
            --rojo-eliminar: #c0392b;
            --whatsapp-color: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--blanco); color: var(--azul-oscuro); scroll-behavior: smooth; }

        /* Navegación */
        header { border-bottom: 1px solid #eee; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 1000; }
        .logo-container { display: flex; align-items: center; text-decoration: none; color: var(--azul-oscuro); }
        .logo-img { height: 40px; margin-right: 10px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 3px; }
        
        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { margin: 0 10px; }
        nav ul li a { text-decoration: none; color: var(--azul-oscuro); font-size: 11px; font-weight: 600; text-transform: uppercase; }

        /* Botón Idioma */
        .lang-btn { background: var(--azul-oscuro); color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 10px; border-radius: 3px; }

        /* WhatsApp Flotante */
        .btn-whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: var(--whatsapp-color); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 3000; }

        /* Secciones */
        section { padding: 60px 10%; }
        .hero { background: var(--azul-fondo); text-align: center; padding: 80px 10%; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 40px; }

        /* Tienda */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid #f0f0f0; padding: 15px; text-align: center; background: #fff; }
        .product-card img { width: 100%; height: 200px; object-fit: contain; }
        .btn-add { background: var(--azul-oscuro); color: white; padding: 10px; border: none; cursor: pointer; width: 100%; font-weight: bold; }

        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; border-radius: 5px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 24px; }

        /* Formulario Feedback */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; }
        .btn-submit { background: var(--azul-marca); color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; font-weight: bold; }

        /* Checkout Button */
        .btn-checkout { background: var(--whatsapp-color); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }

        @media (max-width: 768px) {
            header { flex-direction: column; }
            nav ul { margin-top: 15px; }
        }
    </style>
</head>
<body>

    <!-- Botón WhatsApp Flotante -->
    <a href="https://wa.me/584125586826" target="_blank" class="btn-whatsapp-float">W</a>

    <header>
        <div class="logo-container">
            <img src="image_70549d.png" alt="Logo" class="logo-img">
            <div class="logo-text">SLOANE</div>
        </div>
        <nav>
            <ul>
                <li><a href="#inicio" data-es="Inicio" data-en="Home">Inicio</a></li>
                <li><a href="#comprar" data-es="Productos" data-en="Products">Productos</a></li>
                <li><a href="javascript:void(0)" onclick="openCart()" data-es="Carrito" data-en="Cart">Carrito (<span id="count">0</span>)</a></li>
                <li><button class="lang-btn" onclick="toggleLanguage()">English</button></li>
            </ul>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <h1 id="hero-title" data-es="SLOANE ESSENTIA" data-en="SLOANE ESSENTIA">SLOANE ESSENTIA</h1>
        <p id="hero-sub" data-es="La química que se siente" data-en="The chemistry you feel">La química que se siente</p>
    </section>

    <section id="comprar">
        <div class="shop-grid">
            <div class="product-card">
                <img src="image_7049d6.png" alt="P1">
                <h3>Pure Balance</h3>
                <div class="price">40$</div>
                <button class="btn-add" onclick="addItem('Pure Balance', 40)">+ Add</button>
            </div>
            <!-- Otros productos seguirían aquí -->
        </div>
    </section>

    <section style="text-align: center;">
        <button class="btn-submit" onclick="openFeedback()" data-es="Danos tu opinión" data-en="Give us feedback">Danos tu opinión</button>
    </section>

    <!-- Modal Carrito -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('cartModal')">&times;</span>
            <h3 data-es="Tu Carrito" data-en="Your Cart">Tu Carrito</h3>
            <div id="cart-list" style="margin: 20px 0;"></div>
            <div style="font-weight: bold; border-top: 1px solid #eee; padding-top: 10px;">Total: <span id="total-val">0</span>$</div>
            <button class="btn-checkout" onclick="sendToWhatsApp()" data-es="Comprar por WhatsApp" data-en="Buy via WhatsApp">Comprar por WhatsApp</button>
        </div>
    </div>

    <!-- Modal Feedback -->
    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('feedbackModal')">&times;</span>
            <h3 data-es="Cuéntanos tu experiencia" data-en="Tell us your experience">Cuéntanos tu experiencia</h3>
            <form id="feedbackForm" onsubmit="submitFeedback(event)">
                <div class="form-group">
                    <label data-es="Nombre" data-en="Name">Nombre</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label data-es="Correo" data-en="Email">Correo</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label data-es="País" data-en="Country">País</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label data-es="¿Qué le parece el producto?" data-en="Product quality?">¿Qué le parece el producto?</label>
                    <select>
                        <option value="excelente">Excelente</option>
                        <option value="bueno">Bueno</option>
                        <option value="regular">Regular</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-es="¿Nos recomendarías?" data-en="Would you recommend us?">¿Nos recomendarías?</label>
                    <select>
                        <option value="si">Sí</option>
                        <option value="no">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-es="Frecuencia de uso" data-en="Frequency of use">Frecuencia de uso</label>
                    <select>
                        <option value="diario">Diario</option>
                        <option value="semanal">Semanal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-es="Sugerencias" data-en="Suggestions">Sugerencias</label>
                    <textarea rows="3"></textarea>
                </div>
                <button type="submit" class="btn-submit" data-es="Enviar" data-en="Send">Enviar</button>
            </form>
        </div>
    </div>

    <script>
        let cart = [];
        let currentLang = 'es';

        function toggleLanguage() {
            currentLang = (currentLang === 'es') ? 'en' : 'es';
            document.querySelectorAll('[data-es]').forEach(el => {
                el.innerText = el.getAttribute('data-' + currentLang);
            });
            document.querySelector('.lang-btn').innerText = (currentLang === 'es') ? 'English' : 'Español';
        }

        function addItem(name, price) {
            cart.push({name, price});
            updateUI();
        }

        function updateUI() {
            document.getElementById('count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = '';
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${item.name}</span>
                    <span>${item.price}$ <button onclick="removeItem(${index})" style="color:red; background:none; border:none; cursor:pointer;">X</button></span>
                </div>`;
            });
            document.getElementById('total-val').innerText = total;
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            updateUI();
        }

        function sendToWhatsApp() {
            let message = "Hola Sloane! Deseo comprar: %0A";
            let total = 0;
            cart.forEach(item => {
                message += `- ${item.name} (${item.price}$)%0A`;
                total += item.price;
            });
            message += "%0A Total: " + total + "$";
            window.open(`https://wa.me/584125586826?text=${message}`);
        }

        function openCart() { document.getElementById('cartModal').style.display = 'flex'; }
        function openFeedback() { document.getElementById('feedbackModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function submitFeedback(e) {
            e.preventDefault();
            alert("¡Gracias por tu opinión!");
            closeModal('feedbackModal');
        }
    </script>
</body>
</html>
